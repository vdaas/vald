name: "Create Docker manifest"
description: "An action to create Docker manifest and publish them"
inputs:
  builder:
    description: "Buildx builder name"
    required: true
    default: ""
  target:
    description: "Build target"
    required: true
    default: "base"
  archs:
    description: "Architectures"
    required: true
    default: "amd64"
  primary_tag:
    description: "Primary Tag"
    required: true
  extra_tags:
    description: "Extra tags"
    required: false
outputs:
  PLATFORMS:
    description: "Target platforms"
    value: ${{ steps.determine_platforms.outputs.PLATFORMS }}
runs:
  using: "composite"
  steps:
    - name: Create manifest and push
      shell: bash
      id: create_manifest
      run: |
        push_manifest() {
          make \
            TARGET="${TARGET}" \
            TAG="${1}" \
            ARCHS="${ARCHS}" \
            docker/create/manifest \
            docker/create/manifest/alter
        }
        # The manifest create/push hits docker.io, which intermittently goes
        # unreachable ("Client.Timeout exceeded"). Retry to ride out the blip.
        for tag in ${PRIMARY_TAG} ${EXTRA_TAGS}; do
          attempt=1
          max_attempts=5
          while true; do
            if push_manifest "${tag}"; then
              break
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::docker manifest push for ${TARGET}:${tag} failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "::warning::docker manifest push for ${TARGET}:${tag} attempt ${attempt} failed (likely transient registry timeout); retrying in 30s"
            attempt=$((attempt + 1))
            sleep 30
          done
        done
      env:
        TARGET: ${{ inputs.target }}
        ARCHS: ${{ inputs.archs }}
        PRIMARY_TAG: ${{ inputs.primary_tag }}
        EXTRA_TAGS: ${{ inputs.extra_tags }}
    - name: Inspect image
      shell: bash
      id: inspect_image
      run: |
        inspect_image() {
          make \
            TARGET="${TARGET}" \
            TAG="${1}" \
            docker/inspect/image \
            docker/inspect/image/alter
        }
        # Inspect reads the just-pushed manifest from docker.io; retry over the
        # same transient registry-timeout window.
        for tag in ${PRIMARY_TAG} ${EXTRA_TAGS}; do
          attempt=1
          max_attempts=5
          while true; do
            if inspect_image "${tag}"; then
              break
            fi
            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "::error::docker inspect for ${TARGET}:${tag} failed after ${max_attempts} attempts"
              exit 1
            fi
            echo "::warning::docker inspect for ${TARGET}:${tag} attempt ${attempt} failed (likely transient registry timeout); retrying in 30s"
            attempt=$((attempt + 1))
            sleep 30
          done
        done
      env:
        TARGET: ${{ inputs.target }}
        PRIMARY_TAG: ${{ inputs.primary_tag }}
        EXTRA_TAGS: ${{ inputs.extra_tags }}

name: "Run unit tests (Rust)"
on:
  push:
    branches:
      - main
      - "release/v*.*"
      - "!release/v*.*.*"
    paths:
      - ".github/workflows/test.yaml"
      - "rust/**"
  pull_request:
    paths:
      - ".github/workflows/test.yaml"
      - "rust/**"
jobs:
  dump-contexts-to-log:
    timeout-minutes: 30
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/dump-context
  detect-ci-container:
    permissions:
      contents: read
    uses: ./.github/workflows/_detect-ci-container.yaml
  test-rust-qbg:
    timeout-minutes: 60
    permissions:
      contents: read
    name: Run tests for Rust
    runs-on: ubuntu-latest
    needs: [detect-ci-container]
    container:
      image: ghcr.io/vdaas/vald/vald-dev-container:${{ needs.detect-ci-container.outputs.TAG }}
      credentials:
        username: ${{ secrets.PACKAGE_USER }}
        password: ${{ secrets.PACKAGE_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set Git config
        run: |
          git config --global --add safe.directory ${GITHUB_WORKSPACE}
      - name: Install protobuf compiler
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends protobuf-compiler libprotobuf-dev
      - name: Install NGT
        run: |
          NGT_VERSION=$(cat versions/NGT_VERSION)
          NGT_TMPDIR=$(mktemp -d)
          git clone --depth 1 --branch "v${NGT_VERSION}" https://github.com/NGT-labs/NGT "${NGT_TMPDIR}/NGT"
          # NGT's CMakeLists.txt unconditionally enables GCC LTO (IPO) which produces
          # LTO IR-only objects that rust-lld (LLVM) cannot link. Patch it to disable LTO
          # so objects are compiled as regular ELF that rust-lld can link.
          sed -i 's/set(CMAKE_INTERPROCEDURAL_OPTIMIZATION TRUE)/set(CMAKE_INTERPROCEDURAL_OPTIMIZATION FALSE)/' \
            "${NGT_TMPDIR}/NGT/CMakeLists.txt"
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_STATIC_EXECS=ON \
            -DBUILD_TESTING=OFF \
            -DNGT_LARGE_DATASET=ON \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -B "${NGT_TMPDIR}/NGT/build" \
            "${NGT_TMPDIR}/NGT"
          make -C "${NGT_TMPDIR}/NGT/build" -j$(nproc)
          make -C "${NGT_TMPDIR}/NGT/build" install
          install -m 644 "${NGT_TMPDIR}/NGT/build/lib/NGT/libngt.a" /usr/local/lib/libngt.a
          ldconfig
          rm -rf "${NGT_TMPDIR}"
      - name: Run tests for qbg / gotestfmt
        run: |
          TEST_RESULT_DIR=${GITHUB_WORKSPACE} make test/rust/qbg
      - name: Run tests for agent / gotestfmt
        run: |
          TEST_RESULT_DIR=${GITHUB_WORKSPACE} make test/rust/agent

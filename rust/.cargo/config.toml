[build]
# Prevent target-triple rustflags from being applied to build scripts (host executables).
# Without this, build scripts compiled with -static crash due to glibc TLS issues.
target-applies-to-host = false

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

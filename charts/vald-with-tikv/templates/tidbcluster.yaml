apiVersion: pingcap.com/v1alpha1
kind: TidbCluster
metadata:
  name: tikv
  namespace: {{ .Release.Namespace }}
spec:
  version: "v8.5.2"
  timezone: UTC
  pd:
    baseImage: pingcap/pd
    config: {}
    replicas: 3
    requests:
      storage: "10Gi"
  tidb:
    baseImage: pingcap/tidb
    replicas: 0
  tikv:
    baseImage: pingcap/tikv
    config: {}
    replicas: 3
    requests:
      storage: "100Gi"

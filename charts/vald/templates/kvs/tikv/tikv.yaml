apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/component: tikv
    app.kubernetes.io/instance: tikv
    #app.kubernetes.io/managed-by: tidb-operator
    app.kubernetes.io/name: tidb-cluster
  name: tikv-tikv
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/component: tikv
      app.kubernetes.io/instance: tikv
      #app.kubernetes.io/managed-by: tidb-operator
      app.kubernetes.io/name: tidb-cluster
  template:
    metadata:
      labels:
        app.kubernetes.io/component: tikv
        app.kubernetes.io/instance: tikv
        #app.kubernetes.io/managed-by: tidb-operator
        app.kubernetes.io/name: tidb-cluster
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "20180"
        prometheus.io/scrape: "true"
    spec:
      volumes:
        - name: annotations
          downwardAPI:
            items:
              - path: annotations
                fieldRef:
                  fieldPath: metadata.annotations
        - name: config
          configMap:
            name: tikv-tikv
            items:
              - key: config-file
                path: tikv.toml
        - name: startup-script
          configMap:
            name: tikv-tikv
            items:
              - key: startup-script
                path: tikv_start_script.sh
      containers:
        - name: tikv
          image: pingcap/tikv:v8.5.2
          command:
            - /bin/sh
            - /usr/local/bin/tikv_start_script.sh
          ports:
            - name: server
              containerPort: 20160
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CLUSTER_NAME
              value: tikv
            - name: HEADLESS_SERVICE_NAME
              value: tikv-tikv-peer
            - name: CAPACITY
              value: "0"
            - name: TZ
              value: UTC
          resources: {}
          volumeMounts:
            - name: annotations
              readOnly: true
              mountPath: /etc/podinfo
            - name: tikv
              mountPath: /var/lib/tikv
            - name: config
              readOnly: true
              mountPath: /etc/tikv
            - name: startup-script
              readOnly: true
              mountPath: /usr/local/bin
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: false
      restartPolicy: Always
      dnsPolicy: ClusterFirst
  volumeClaimTemplates:
    - metadata:
        name: tikv
        creationTimestamp: null
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
      status: {}
  serviceName: tikv-tikv-peer
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 3

time_zone: UTC
logging:
  format: raw
  level: info
  logger: glg
dataset:
  name: _E2E_DATASET_PATH_
target:
  addrs:
    - 127.0.0.1:28081
  health_check_duration: 30s
  connection_pool:
    enable_dns_resolver: true
    enable_rebalance: true
    old_conn_close_duration: 2m
    rebalance_duration: 30m
    size: 1
  call_option:
    wait_for_ready: true
  dial_option:
    insecure: true
    min_connection_timeout: 20s
    keepalive:
      permit_without_stream: false
      time: 60s
      timeout: 30s
strategies:
  - concurrency: 1
    name: Embedder test
    operations:
      - name: Embedding operation
        executions:
          - name: Embedding
            type: embedding
            mode: unary
            text: hello from e2e
          - name: Insert via embedder
            type: embedder_insert
            mode: unary
            document_id: e2e-embedder-doc-1
            text: hello from e2e insert
          # - name: Insert with metadata via embedder
          #   type: embedder_insert_with_metadata
          #   mode: unary
          #   document_id: e2e-embedder-doc-2
          #   text: hello from e2e insert with metadata
          - name: Update via embedder
            type: embedder_update
            mode: unary
            document_id: e2e-embedder-doc-1
            text: hello from e2e update
            expect:
              - status_code: ok
              - status_code: not_found
              - status_code: already_exists
          # - name: Update with metadata via embedder
          #   type: embedder_update_with_metadata
          #   mode: unary
          #   document_id: e2e-embedder-doc-2
          #   text: hello from e2e update with metadata
          - name: Upsert via embedder
            type: embedder_upsert
            mode: unary
            document_id: e2e-embedder-doc-3
            text: hello from e2e upsert
          # - name: Upsert with metadata via embedder
          #   type: embedder_upsert_with_metadata
          #   mode: unary
          #   document_id: e2e-embedder-doc-4
          #   text: hello from e2e upsert with metadata
          - name: Remove via embedder
            type: embedder_remove
            mode: unary
            document_id: e2e-embedder-doc-3
            expect:
              - status_code: ok
              - status_code: not_found
          # - name: Remove with metadata via embedder
          #   type: embedder_remove_with_metadata
          #   mode: unary
          #   document_id: e2e-embedder-doc-4
          - name: Flush final
            type: flush
            mode: unary

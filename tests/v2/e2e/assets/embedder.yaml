time_zone: UTC
logging:
  format: raw
  level: info
  logger: glg
dataset:
  name: _E2E_DATASET_PATH_
target:
  addrs:
    - 127.0.0.1:28081
  health_check_duration: 30s
  connection_pool:
    enable_dns_resolver: true
    enable_rebalance: true
    old_conn_close_duration: 2m
    rebalance_duration: 30m
    size: 1
  call_option:
    wait_for_ready: true
  dial_option:
    insecure: true
    min_connection_timeout: 20s
    keepalive:
      permit_without_stream: false
      time: 60s
      timeout: 30s
strategies:
  - concurrency: 1
    name: Embedder test
    operations:
      - name: Embedding operation
        executions:
          - name: Embedding
            type: embedding
            mode: unary
            text: hello from e2e
          - name: Insert via embedder
            type: embedder_insert
            mode: unary
            text: hello from e2e insert
            repeats:
              enabled: true
              exit_condition: count
              count: 50
          - name: Wait after insert
            type: wait
            wait: 20s
          - name: Upsert via embedder
            type: embedder_upsert
            mode: unary
            text: hello from e2e upsert
            repeats:
              enabled: true
              exit_condition: count
              count: 50
          - name: Wait after upsert
            type: wait
            wait: 20s
          - name: Flush final
            type: flush
            mode: unary

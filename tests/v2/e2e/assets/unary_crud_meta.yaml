time_zone: UTC
logging:
  format: raw
  level: debug
  logger: glg
dataset:
  name: _E2E_DATASET_PATH_
kubernetes:
  kube_config: _KUBECONFIG_
  port_forward:
    enabled: true
    local_port: 8082
    namespace: _E2E_TARGET_NAMESPACE_
    service_name: _E2E_TARGET_NAME_
    target_port: 8081
target:
  addrs:
    - 127.0.0.1:8082
  health_check_duration: 1s
  connection_pool:
    enable_dns_resolver: true
    enable_rebalance: true
    old_conn_close_duration: 2m
    rebalance_duration: 30m
    size: 3
  backoff:
    backoff_factor: 1.1
    backoff_time_limit: 5s
    enable_error_log: false
    initial_duration: 5ms
    jitter_limit: 100ms
    maximum_duration: 5s
    retry_count: 100
  call_option:
    content_subtype: ""
    max_recv_msg_size: 0
    max_retry_rpc_buffer_size: 0
    max_send_msg_size: 0
    wait_for_ready: true
  dial_option:
    authority: ""
    backoff_base_delay: 1s
    backoff_jitter: 0.2
    backoff_max_delay: 120s
    backoff_multiplier: 1.6
    disable_retry: false
    enable_backoff: true
    idle_timeout: ""
    initial_connection_window_size: 2097152
    initial_window_size: 1048576
    insecure: true
    interceptors: []
    keepalive:
      permit_without_stream: false
      time: ""
      timeout: 30s
    max_call_attempts: 0
    max_header_list_size: 0
    max_msg_size: 0
    min_connection_timeout: 20s
    net:
      dialer:
        dual_stack_enabled: true
        keepalive: ""
        timeout: ""
      dns:
        cache_enabled: true
        cache_expiration: 1h
        refresh_duration: 30m
      network: tcp
      socket_option:
        ip_recover_destination_addr: false
        ip_transparent: false
        reuse_addr: true
        reuse_port: true
        tcp_cork: false
        tcp_defer_accept: false
        tcp_fast_open: false
        tcp_no_delay: false
        tcp_quick_ack: false
      tls:
        ca: /path/to/ca
        cert: /path/to/cert
        enabled: false
        insecure_skip_verify: true
        key: /path/to/key
    read_buffer_size: 0
    shared_write_buffer: true
    timeout: ""
    user_agent: Vald-gRPC
    write_buffer_size: 0
  tls:
    ca: /path/to/ca
    cert: /path/to/cert
    enabled: false
    insecure_skip_verify: true
    key: /path/to/key
metadata:
  key1: sample metadata value1
  key2: sample metadata value2
  key3: sample metadata value3
metadata_string: key4=value4,key5=value5
metrics:
  enabled: true
  latency_histogram:
    num_shards: 16
  queue_wait_histogram:
    num_shards: 16
  latency_tdigest:
    compression: 100
    compression_trigger_factor: 1.2
    num_shards: 16
    quantiles:
      - 0.1
      - 0.25
      - 0.5
      - 0.75
      - 0.9
      - 0.95
      - 0.99
  queue_wait_tdigest:
    compression: 100
    compression_trigger_factor: 1.2
    num_shards: 16
    quantiles:
      - 0.1
      - 0.25
      - 0.5
      - 0.75
      - 0.9
      - 0.95
      - 0.99
  exemplar:
    capacity: 10
    num_shards: 16
    sampling_rate: 16
  detailed_error_tracking: true
  range_scales:
    - name: 0-100
      width: 10
      capacity: 10
  time_scales:
    - name: 0-10s
      width: 1
      capacity: 10
  custom_counters:
    - custom_counter_1
strategies:
  - concurrency: 1
    name: check Index Property
    operations:
      - name: IndexProperty
        executions:
          - mode: unary
            name: IndexProperty
            type: index_property
            wait: 3s
            expect:
              - status_code: ok
                path: $.details.length()
                op: ge
                value: 3
  - concurrency: 1
    name: Initial InsertMeta and Wait
    operations:
      - name: InsertMeta -> IndexInfo
        executions:
          - name: Flush
            mode: unary
            type: flush
            wait: 20s
          - mode: unary
            name: IndexInfo
            type: index_info
            expect:
              - value: {}
          - name: InsertMeta
            type: insert_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_INSERT_COUNT_
            qps: _E2E_QPS_
            wait: 5m
          - mode: unary
            name: IndexInfo
            type: index_info
            retry_until_success_timeout: 30m
            expect:
              - status_code: ok
                path: $.stored
                value: _E2E_EXPECTED_INDEX_
  - concurrency: 4
    name: Parallel SearchMeta Opeation (SearchMeta, SearchByIDMeta, LinearSearchMeta, LinearSearchByIDMeta) x (ConcurrentQueue, SortSlice, SortPoolSlice, PairingHeap) = 16
    operations:
      - name: SearchMeta Operation
        executions:
          - name: SearchMeta with ConcurrentQueue
            type: search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: cq
          - name: SearchMeta with SortSlice
            type: search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ss
          - name: SearchMeta with SortPoolSlice
            type: search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ps
          - name: SearchMeta with PairingHeap
            type: search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ph
      - name: SearchByIDMeta Operation
        executions:
          - name: SearchByIDMeta with ConcurrentQueue
            type: search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: cq
          - name: SearchByIDMeta with SortSlice
            type: search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ss
          - name: SearchByIDMeta with SortPoolSlice
            type: search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ps
          - name: SearchByIDMeta with PairingHeap
            type: search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ph
      - name: LinearSearchMeta Operation
        executions:
          - name: LinearSearchMeta with ConcurrentQueue
            type: linear_search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: cq
          - name: LinearSearchMeta with SortSlice
            type: linear_search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ss
          - name: LinearSearchMeta with SortPoolSlice
            type: linear_search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ps
          - name: LinearSearchMeta with PairingHeap
            type: linear_search_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ph
      - name: LinearSearchByIDMeta Operation
        executions:
          - name: LinearSearchByIDMeta with ConcurrentQueue
            type: linear_search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: cq
          - name: LinearSearchByIDMeta with SortSlice
            type: linear_search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ss
          - name: LinearSearchByIDMeta with SortPoolSlice
            type: linear_search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ps
          - name: LinearSearchByIDMeta with PairingHeap
            type: linear_search_by_id_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
            search:
              timeout: 3s
              algorithm: ph
  - concurrency: 3
    name: GetObject/Exists/GetTimestamp Opeation
    operations:
      - name: GetObject Operation
        executions:
          - name: GetObject
            type: object
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
      - name: Exists Operation
        executions:
          - name: Exists
            type: exists
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
      - name: GetTimestamp Operation
        executions:
          - name: GetTimestamp
            type: timestamp
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_SEARCH_COUNT_
  - concurrency: 1
    name: Update -> Index Detail
    operations:
      - name: UpdateMeta Index Detail Operation
        executions:
          - name: UpdateMeta
            type: update_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_UPDATE_COUNT_
            offset: 0
            wait: 2m
          - name: IndexDetail
            type: index_detail
            mode: unary
  - concurrency: 2
    name: RemoveMeta with UpsertMeta -> Index stats and detail
    operations:
      - name: RemoveMeta IndexStatistics Operation
        executions:
          - name: RemoveMeta
            type: remove_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_UPDATE_COUNT_
          - name: IndexStatistics
            type: index_statistics
            mode: unary
      - name: Upsert IndexDetail Operation
        executions:
          - name: UpsertMeta
            type: upsert_meta
            mode: unary
            parallelism: _E2E_PARALLELISM_
            num: _E2E_UPDATE_COUNT_
          - name: IndexDetail
            type: index_detail
            mode: unary
    wait: 2m
  - concurrency: 1
    name: RemoveByTimestampMeta -> IndexDetail -> UpsertMeta -> IndexDetail
    operations:
      - name: RemoveByTimestampMeta IndexDetail UpsertMeta Operation
        executions:
          - name: RemoveByTimestampMeta
            mode: unary
            type: remove_by_timestamp_meta
            wait: 2m
            num: 1
          - name: IndexDetail
            mode: unary
            type: index_detail
          - name: UpsertMeta
            parallelism: _E2E_PARALLELISM_
            mode: unary
            num: _E2E_UPDATE_COUNT_
            offset: 0
            type: upsert_meta
            wait: 2m
          - name: IndexDetail
            mode: unary
            type: index_detail
  - concurrency: 1
    name: IndexStatistics -> Flush -> IndexInfo
    operations:
      - executions:
          - name: IndexStatistics
            mode: unary
            type: index_statistics_detail
          - name: Flush
            mode: unary
            type: flush
            wait: 20s
          - name: IndexInfo
            mode: unary
            type: index_info
            expect:
              - value: {}
